name: DecisionSimEnv
version: "1.1.0"
description: >
  Universal Decision Stress-Tester. Anyone — a founder, student, investor,
  or individual — enters any situation in plain language. The environment
  stress-tests it across three escalating tasks: autopsy of weaknesses,
  mapping of all possible futures with probabilities, and a month-by-month
  simulation with a final verdict. Works for business, personal, career,
  investment, or policy decisions. Like Dr Strange viewing 14 million futures
  — except for your actual life.
author: Raghav Agarwal
tags:
  - openenv
  - decision-making
  - simulation
  - business
  - personal
  - career
  - investment

tasks:
  - id: task1_autopsy
    name: Idea Autopsy
    difficulty: easy
    description: >
      AI extracts a structured goal profile from the user's situation, finds
      at least 3 specific weaknesses, names real competitors who tried
      something similar, explains why at least one failed, and identifies
      the single biggest blind spot the user is missing.
    max_steps: 3
    score_range: [0.0, 1.0]
    scoring_criteria:
      - goal_extraction
      - weaknesses_found
      - real_examples_used
      - failure_analysis
      - blind_spot_identified
      - math_score

  - id: task2_scenarios
    name: Scenario Mapping
    difficulty: medium
    description: >
      AI maps exactly 5 realistic future scenarios with probability estimates
      that sum to 100%, covering best case, worst case, most likely,
      unexpected external event, and the hidden path. Each scenario is
      checked against the user's actual goals.
    max_steps: 3
    score_range: [0.0, 1.0]
    scoring_criteria:
      - scenario_count
      - has_probabilities
      - probabilities_sum_correctly
      - scenario_coverage
      - goal_alignment_checked
      - math_score

  - id: task3_simulation
    name: Future Path Simulator
    difficulty: hard
    description: >
      AI simulates the best-fit scenario month by month for 12 months,
      surfaces unexpected consequences at each stage, compares all paths
      in a table, and gives one clear final recommendation with specific
      actions to take this week. No hedging. No "it depends".
    max_steps: 3
    score_range: [0.0, 1.0]
    scoring_criteria:
      - timeline_simulation
      - unexpected_consequences
      - path_comparison
      - has_final_verdict
      - actionable_recommendation
      - math_score

observation_space:
  type: text
  fields:
    - task_id
    - user_input
    - goal_profile
    - current_step
    - max_steps
    - previous_analysis
    - instructions

action_space:
  type: text
  fields:
    - analysis
    - chosen_path
  note: >
    Pass analysis="AUTO" to have the server call its own LLM automatically.

reward:
  type: float
  range: [0.0, 1.0]
  partial_credit: true
  description: >
    Blended score: 60% keyword/heuristic grading + 40% mathematical grading
    (expected value, sensitivity analysis, regret minimization, specificity,
    coverage, entropy quality). Penalties applied for short or vague responses.
    Final episode score is the average across all 3 steps.

baseline_scores:
  model: llama-3.3-70b-versatile
  provider: Groq
  task1_autopsy: 1.00
  task2_scenarios: 0.93
  task3_simulation: 0.89
  overall: 0.94
